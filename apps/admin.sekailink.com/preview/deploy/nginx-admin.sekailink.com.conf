server {
    listen 80;
    server_name admin.sekailink.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.sekailink.com;

    access_log /var/log/nginx/admin.sekailink.com-access.log;
    error_log /var/log/nginx/admin.sekailink.com-error.log;

    # Configure certificates with certbot or your existing TLS automation.
    ssl_certificate /etc/letsencrypt/live/admin.sekailink.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.sekailink.com/privkey.pem;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location / {
        proxy_pass http://127.0.0.1:19110;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
