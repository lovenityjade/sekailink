<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SekaiLink - Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0a0a0c; --panel: #141417; --accent: #00ff88; --text: #e0e0e0; --border: #2d2d33; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 80px; background: #000; display: flex; flex-direction: column; align-items: center; padding: 20px 0; border-right: 1px solid var(--border); }
        .nav-item { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; cursor: pointer; color: #555; font-size: 1.2rem; }
        .nav-item.active { background: var(--accent); color: #000; box-shadow: 0 0 15px rgba(0,255,136,0.4); }

        .main { flex: 1; display: flex; flex-direction: column; }
        .header { height: 70px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 30px; justify-content: space-between; background: #000; }
        .view { display: none; padding: 40px; overflow-y: auto; flex: 1; }
        .view.active { display: block; }

        .card { background: var(--panel); border-radius: 16px; padding: 30px; border: 1px solid var(--border); margin-bottom: 20px; }
        .btn { padding: 12px 24px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; background: var(--accent); color: #000; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        td, th { padding: 15px; border-bottom: 1px solid #1a1a1d; text-align: left; }
        .status-badge { background: #222; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; }
        
        .drop-zone { border: 2px dashed var(--border); border-radius: 16px; padding: 40px; text-align: center; cursor: pointer; }
        .progress-container { width: 100%; background: #1a1a1d; border-radius: 8px; margin-top: 15px; height: 10px; display: none; }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s; }

        #studioContainer { display: flex; height: calc(100vh - 150px); gap: 20px; }
        #yamlList { width: 250px; background: #000; border: 1px solid var(--border); border-radius: 12px; overflow-y: auto; padding: 10px; }
        .yaml-item { padding: 10px; border-bottom: 1px solid #111; cursor: pointer; }
        .yaml-item:hover { color: var(--accent); }
        #editor { flex: 1; border-radius: 12px; overflow: hidden; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="nav-item active" onclick="switchTab('home')"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="switchTab('studio')"><i class="fas fa-code"></i></div>
        <div class="nav-item" onclick="switchTab('vault')"><i class="fas fa-microchip"></i></div>
        <div class="nav-item" onclick="switchTab('settings')"><i class="fas fa-user-cog"></i></div>
    </nav>

    <div class="main">
        <div class="header">
            <h2 id="pageTitle">LOBBIES</h2>
            <div style="display:flex; align-items:center; gap:15px">
                <b id="usernameDisplay">...</b>
                <img id="userAvatar" src="" style="width:40px; border-radius:50%">
            </div>
        </div>

        <div id="homeView" class="view active">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <h1>My Multiworld Sessions</h1>
                <button class="btn" onclick="openGenerator()">+ Create Session</button>
            </div>
            <div class="card">
                <table>
                    <thead><tr><th>Name</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody id="lobbyTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="vaultView" class="view">
            <h1>ROM Vault</h1>
            <div class="drop-zone" id="dropZone">
                <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; color: var(--accent)"></i>
                <p>Drop your ROMs here</p>
                <input type="file" id="romInput" style="display:none" multiple>
                <button class="btn" onclick="document.getElementById('romInput').click()">Browse</button>
                <div class="progress-container" id="progressContainer"><div class="progress-bar" id="progressBar"></div></div>
            </div>
            <div class="card" style="margin-top:20px">
                <table>
                    <thead><tr><th>File</th><th>Game</th><th>SHA-1</th><th>Status</th></tr></thead>
                    <tbody id="romTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="studioView" class="view">
            <h1>YAML Studio</h1>
            <div id="studioContainer">
                <div id="yamlList"></div>
                <div style="flex:1; display:flex; flex-direction:column; gap:10px">
                    <input type="text" id="yamlName" placeholder="filename.yaml" style="background:#000; color:#fff; border:1px solid var(--border); padding:10px; border-radius:8px">
                    <div id="editor"></div>
                    <button class="btn" onclick="saveYaml()">Save</button>
                </div>
            </div>
        </div>

        <div id="settingsView" class="view">
            <h1>Profile Settings</h1>
            <div class="card" style="max-width:500px">
                <label>Bio</label><br>
                <textarea id="bioInput" style="width:100%; height:100px; background:#000; color:#fff; border:1px solid var(--border); border-radius:8px; margin: 10px 0"></textarea>
                <button class="btn" onclick="updateProfile()">Update</button>
            </div>
        </div>

        <div id="genModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center">
            <div class="card" style="width:450px">
                <h3>New Generation</h3>
                <input type="text" id="newLobbyName" placeholder="Session name" style="width:100%; padding:10px; margin-bottom:15px; background:#000; border:1px solid var(--border); color:#fff">
                <div id="yamlSelectorList" style="max-height:200px; overflow-y:auto; margin-bottom:15px"></div>
                <div style="display:flex; gap:10px">
                    <button class="btn" onclick="startGeneration(event)" style="flex:1">Start</button>
                    <button class="btn" onclick="closeGenerator()" style="background:#444; color:#fff">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let userData = {};
        const editor = ace.edit("editor");
        editor.setTheme("ace/theme/tomorrow_night_eighties");
        editor.session.setMode("ace/mode/yaml");

        async function init() {
            const res = await fetch('/api/me');
            if(!res.ok) return location.href = '/';
            userData = await res.json();
            document.getElementById('usernameDisplay').innerText = userData.username;
            document.getElementById('userAvatar').src = userData.avatar;
            document.getElementById('bioInput').value = userData.bio || "";
            loadLobbies(); loadYamls(); loadRoms();
            setInterval(loadLobbies, 10000);
        }

        function switchTab(tab) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(tab + 'View').classList.add('active');
            document.getElementById('pageTitle').innerText = tab.toUpperCase();
            
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => { if(item.getAttribute('onclick').includes(tab)) item.classList.add('active'); });
        }

        async function loadLobbies() {
            const res = await fetch('/api/lobbies', { credentials: 'include' });
            if(!res.ok) return;
            const lobbies = await res.json();
            document.getElementById('lobbyTableBody').innerHTML = lobbies.map(l => `
                <tr>
                    <td><b>${l.name}</b></td>
                    <td>${l.players}</td>
                    <td><span class="status-badge">${l.status}</span></td>
                    <td>
                        <button class="btn" style="padding:5px 15px; font-size:0.8rem" onclick="joinLobby(${l.id})">
                            <i class="fas fa-sign-in-alt"></i> JOIN
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function joinLobby(lobbyId) {
            const res = await fetch(`/api/lobbies/${lobbyId}/join`, {
                method: 'POST',
                credentials: 'include'
            });

            if (res.ok) {
                window.location.href = `/lobby.html?id=${lobbyId}`;
            } else {
                const data = await res.json();
                alert(`Failed to join: ${data.error}`);
            }
        }

        async function openGenerator() {
            const lobbyName = prompt('Enter lobby name:');
            if (!lobbyName) return;

            const res = await fetch('/api/lobbies/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({
                    name: lobbyName,
                    max_players: 10,
                    visibility: 'open'
                })
            });

            if (res.ok) {
                const data = await res.json();
                window.location.href = `/lobby.html?id=${data.lobby_id}`;
            } else {
                alert('Failed to create lobby');
            }
        }

        async function loadYamls() {
            const res = await fetch('/api/yamls');
            const yamls = await res.json();
            document.getElementById('yamlList').innerHTML = yamls.map(y => `
                <div class="yaml-item" onclick="loadToEditor('${y.id}')">📄 ${y.filename}</div>
            `).join('');
        }

        async function loadToEditor(id) {
            const res = await fetch('/api/yamls');
            const yamls = await res.json();
            const y = yamls.find(i => i.id == id);
            if(y) { editor.setValue(y.content); document.getElementById('yamlName').value = y.filename; }
        }

        async function saveYaml() {
            const name = document.getElementById('yamlName').value;
            await fetch('/api/yamls', { method: 'POST', headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({filename: name, content: editor.getValue()}) });
            loadYamls(); alert("YAML Saved");
        }

        async function loadRoms() {
            const res = await fetch('/api/roms');
            const roms = await res.json();
            document.getElementById('romTableBody').innerHTML = roms.map(r => `
                <tr><td>${r.name}</td><td>${r.game}</td><td><code>${r.sha.substring(0,8)}</code></td>
                <td><span class="status-badge">${r.status}</span></td></tr>
            `).join('');
        }

        async function uploadRom(file) {
            const formData = new FormData(); formData.append('file', file);
            const container = document.getElementById('progressContainer'); const bar = document.getElementById('progressBar');
            container.style.display = 'block';
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/roms/upload', true);
            xhr.upload.onprogress = (e) => { if(e.lengthComputable) bar.style.width = Math.round((e.loaded/e.total)*100)+'%'; };
            xhr.onload = () => { if(xhr.status === 200) { loadRoms(); container.style.display = 'none'; bar.style.width = '0%'; } };
            xhr.send(formData);
        }

        document.getElementById('romInput').onchange = (e) => { for(let f of e.target.files) uploadRom(f); };
        const dz = document.getElementById('dropZone');
        dz.ondragover = (e) => e.preventDefault();
        dz.ondrop = (e) => { e.preventDefault(); for(let f of e.dataTransfer.files) uploadRom(f); };

        function openGenerator() { document.getElementById('genModal').style.display = 'flex'; updateYamlSelector(); }
        function closeGenerator() { document.getElementById('genModal').style.display = 'none'; }

        async function updateYamlSelector() {
            const res = await fetch('/api/yamls'); const yamls = await res.json();
            document.getElementById('yamlSelectorList').innerHTML = yamls.map(y => `
                <div style="padding:5px"><input type="checkbox" class="yaml-check" value="${y.id}"> ${y.filename}</div>
            `).join('');
        }

        async function startGeneration(e) {
            const btn = e.target; const name = document.getElementById('newLobbyName').value;
            const selected = Array.from(document.querySelectorAll('.yaml-check:checked')).map(cb => cb.value);
            if(!name || selected.length === 0) return alert("Select name and YAMLs");
            btn.disabled = true; btn.innerText = "Generating...";
            await fetch('/api/generate', { method: 'POST', headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ name: name, yaml_ids: selected }) });
            closeGenerator(); loadLobbies(); btn.disabled = false; btn.innerText = "Start";
        }

        async function updateProfile() {
            const bio = document.getElementById('bioInput').value;
            await fetch('/api/me', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ bio: bio }) });
            alert("Profile updated");
        }

        init();
    </script>
</body>
</html>
