# set a room flag when the flower outside D6 is broken to make the pillar go away forever
06//checkBreakD6Flower: |
    push af
    push bc
    ld bc,$0100
    call compareRoom
    pop bc
    jr nz,@done
    ldh a,($93)     ; hBrokenTilePosition
    cp $52
    jr nz,@done
    push hl
    ld hl,$c701
    set 0,(hl)
    pop hl
    @done:
    pop af
    jp setTile
06/4774/: call checkBreakD6Flower

