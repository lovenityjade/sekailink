<VirtualHost *:80>
    ServerName sekailink.com
    ServerAlias www.sekailink.com

    DocumentRoot /var/www/sekailink.com/public
    DirectoryIndex index.php index.html

    <Directory /var/www/sekailink.com/public>
        AllowOverride All
        Options FollowSymLinks
        Require all granted
    </Directory>

    RewriteEngine On

    ProxyPreserveHost On
    ProxyPass /api/identity/ http://127.0.0.1:19095/
    ProxyPassReverse /api/identity/ http://127.0.0.1:19095/
    ProxyPass /api/room/ http://127.0.0.1:19094/
    ProxyPassReverse /api/room/ http://127.0.0.1:19094/

    <Location /api/room/>
        RequestHeader set Authorization "Bearer evolution-public-room-query-token-20260326"
    </Location>

    ErrorLog ${APACHE_LOG_DIR}/sekailink.com-error.log
    CustomLog ${APACHE_LOG_DIR}/sekailink.com-access.log combined
</VirtualHost>
