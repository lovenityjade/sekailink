<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SekaiLink - Public Stress Test</title>
  <meta name="description" content="SekaiLink Public Stress Test is now available.">
  <meta name="theme-color" content="#050508">
  <meta property="og:title" content="SekaiLink - Public Stress Test">
  <meta property="og:description" content="SekaiLink Public Stress Test is now available.">
  <meta property="og:image" content="/assets/branding/landing-announcement.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: #050508;
      color: #fff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 50% 18%, rgba(0, 174, 255, 0.18), transparent 38rem),
        radial-gradient(circle at 74% 35%, rgba(255, 0, 190, 0.12), transparent 34rem),
        linear-gradient(135deg, #020409, #061016 48%, #050508);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 0 4vw;
      background: linear-gradient(to bottom, rgba(2, 4, 9, 0.94), rgba(2, 4, 9, 0.58));
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(78, 240, 210, 0.18);
    }

    .topbar__inner {
      max-width: 1480px;
      height: 72px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(0, 229, 255, 0.44);
    }

    .brand__mark {
      width: 36px;
      height: 36px;
      object-fit: contain;
      filter: drop-shadow(0 0 12px rgba(0, 229, 255, 0.52));
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-left: auto;
      font-size: 14px;
      color: rgba(255,255,255,0.78);
    }

    .nav a:hover {
      color: #fff;
    }

    .topbar__actions {
      display: flex;
      gap: 10px;
    }

    .music-toggle {
      cursor: pointer;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 16px;
      border-radius: 8px;
      border: 1px solid rgba(78, 240, 210, 0.28);
      color: #fff;
      font-weight: 750;
      white-space: nowrap;
    }

    .btn--primary {
      background: linear-gradient(135deg, #00d5ff, #ff2bd6);
      border-color: rgba(255,255,255,0.24);
      box-shadow: 0 0 24px rgba(255, 43, 214, 0.22);
    }

    .btn--ghost {
      background: rgba(255,255,255,0.06);
    }

    .page {
      max-width: 1480px;
      margin: 0 auto;
      padding: 24px 4vw 56px;
    }

    .announcement {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid rgba(78, 240, 210, 0.26);
      background: rgba(2, 7, 12, 0.82);
      box-shadow:
        0 28px 90px rgba(0, 0, 0, 0.66),
        0 0 58px rgba(0, 174, 255, 0.16),
        0 0 72px rgba(255, 0, 190, 0.10);
    }

    .announcement::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    .announcement img {
      display: block;
      width: 100%;
      aspect-ratio: 1672 / 941;
      object-fit: contain;
      object-position: center top;
      background: #020409;
    }

    .hotspot {
      position: absolute;
      z-index: 5;
      border-radius: 8px;
    }

    .hotspot:focus-visible {
      outline: 2px solid rgba(255,255,255,0.95);
      outline-offset: 4px;
      box-shadow: 0 0 0 8px rgba(0, 229, 255, 0.20), 0 0 28px rgba(255, 43, 214, 0.38);
    }

    .hotspot--discord {
      left: 2.2%;
      bottom: 2.8%;
      width: 31.4%;
      height: 10.4%;
    }

    .hotspot--register {
      left: 36.4%;
      bottom: 2.8%;
      width: 29.8%;
      height: 10.4%;
    }

    .hotspot--download {
      left: 67.6%;
      bottom: 2.8%;
      width: 30.2%;
      height: 10.4%;
    }

    @media (max-width: 820px) {
      .topbar__inner {
        height: auto;
        min-height: 66px;
        flex-wrap: wrap;
        padding: 12px 0;
      }

      .nav {
        order: 3;
        width: 100%;
        margin-left: 0;
        justify-content: center;
        gap: 16px;
        font-size: 13px;
      }

      .topbar__actions {
        margin-left: auto;
      }

      .btn {
        min-height: 34px;
        padding: 0 12px;
        font-size: 13px;
      }

      .page {
        padding-top: 16px;
      }
    }

    @media (max-width: 560px) {
      .brand span {
        display: none;
      }

      .nav {
        display: none;
      }

      .announcement {
        border-radius: 6px;
      }

      .hotspot--discord,
      .hotspot--register,
      .hotspot--download {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="/announcement-test.html" aria-label="SekaiLink announcement test">
        <img class="brand__mark" src="/assets/branding/sekailink-logo-image.png" width="36" height="36" alt="">
        <span>SekaiLink</span>
      </a>
      <nav class="nav" aria-label="Announcement test navigation">
        <a href="https://discord.gg/jTaefxAEDW" target="_blank" rel="noopener">Discord</a>
        <a href="/register">Register</a>
        <a href="https://sekailink.com/downloads/client/prebeta3/20260628/SekaiLink-BETA-3-Windows-Canonical.exe">Downloads</a>
      </nav>
      <div class="topbar__actions">
        <button class="btn btn--ghost music-toggle" type="button" id="music-toggle">Music</button>
        <a class="btn btn--ghost" href="/">Maintenance</a>
        <a class="btn btn--primary" href="https://sekailink.com/downloads/client/prebeta3/20260628/SekaiLink-BETA-3-Windows-Canonical.exe">Download</a>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="announcement" aria-label="SekaiLink Public Stress Test announcement">
      <img
        src="/assets/branding/landing-announcement.png"
        width="1672"
        height="941"
        alt="SekaiLink Public Stress Test is now available. Join our Discord, register, or go to the downloads."
        fetchpriority="high"
      >
      <a class="hotspot hotspot--discord" href="https://discord.gg/jTaefxAEDW" target="_blank" rel="noopener" aria-label="Join the SekaiLink Discord"></a>
      <a class="hotspot hotspot--register" href="/register" aria-label="Register for SekaiLink"></a>
      <a class="hotspot hotspot--download" href="https://sekailink.com/downloads/client/prebeta3/20260628/SekaiLink-BETA-3-Windows-Canonical.exe" aria-label="Go to the SekaiLink downloads"></a>
    </section>
  </main>
  <audio id="launch-audio" src="/assets/audio/sekailink-click-launch.mp3" preload="auto" autoplay loop></audio>
  <script>
    (function () {
      var audio = document.getElementById("launch-audio");
      var toggle = document.getElementById("music-toggle");
      if (!audio) return;

      audio.volume = 0.5;

      var setToggle = function () {
        if (!toggle) return;
        toggle.textContent = audio.paused ? "Music" : "Mute";
      };

      var playAudio = function () {
        audio.play().then(setToggle).catch(setToggle);
      };

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", playAudio, { once: true });
      } else {
        playAudio();
      }

      window.addEventListener("pointerdown", playAudio, { once: true });
      window.addEventListener("keydown", playAudio, { once: true });

      if (toggle) {
        toggle.addEventListener("click", function () {
          if (audio.paused) {
            playAudio();
          } else {
            audio.pause();
            setToggle();
          }
        });
      }
    })();
  </script>
</body>
</html>
