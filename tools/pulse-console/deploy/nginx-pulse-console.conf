server {
    listen 80;
    listen [::]:80;
    server_name pulse.sekailink.com;

    access_log /var/log/nginx/pulse.sekailink.com-access.log;
    error_log /var/log/nginx/pulse.sekailink.com-error.log;

    location / {
        proxy_pass http://127.0.0.1:18183;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 260s;
        proxy_send_timeout 260s;
    }
}
